[workspace]
members = [".", "crates/quanta-ir", "crates/quanta-macros", "crates/quanta-compiler", "crates/quanta-bench"]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/zelez-lab/quanta"

[workspace.dependencies]
quanta-ir = { path = "crates/quanta-ir", version = "0.1.0" }

[package]
name = "quanta"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "GPU compute and rendering API — quarks, protons, nuclei, fields"
keywords = ["gpu", "compute", "shader", "metal", "vulkan"]
categories = ["graphics", "hardware-support"]
readme = "README.md"

[features]
default = ["metal"]
std = []
metal = ["std"]
vulkan = ["std"]
## CPU software driver: execute KernelDef IR without GPU hardware.
software = ["std", "jit"]
## Enable JIT compilation: runtime shader emission from embedded KernelDef IR.
jit = ["quanta-ir/jit"]
## WebGPU driver, browser-only (target_arch = "wasm32"). Pure scaffold for now;
## actual JS-side bindings will be hand-written `extern "C"` blocks via
## `wasm-bindgen` once step 079 (JIT WGSL emitter) lands. No external wrapper
## crate is permitted (step 000 policy: no `ash`, `metal-rs`, `objc`, `web-sys`).
webgpu = ["std", "jit"]

[dependencies]
quanta-macros = { path = "crates/quanta-macros", version = "0.1.0" }
quanta-ir.workspace = true

[dev-dependencies]
proptest = "1"
