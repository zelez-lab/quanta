[workspace]
members = [".", "crates/quanta-ir", "crates/quanta-macros", "crates/quanta-compiler"]

[package]
name = "quanta"
version = "0.1.0"
edition = "2024"
description = "GPU compute and rendering API — quarks, protons, nuclei, fields"

[features]
default = ["metal", "naga-shaders"]
metal = ["dep:metal", "dep:objc"]
vulkan = ["dep:ash", "naga-shaders"]
naga-shaders = ["dep:naga"]
software = []

[dependencies]
metal = { version = "0.33.0", optional = true }
objc = { version = "0.2.7", optional = true }
ash = { version = "0.38.0", optional = true }
naga = { version = "29.0.1", features = ["wgsl-in", "spv-out", "spv-in", "wgsl-out", "msl-out"], optional = true }
quanta-macros = { path = "crates/quanta-macros" }
quanta-ir = { path = "crates/quanta-ir" }
