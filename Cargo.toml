[workspace]
members = [
    ".",
    "crates/quanta-ir",
    "crates/quanta-macros",
    "crates/quanta-compiler",
    "crates/quanta-bench",
    "examples/web_add_one",
    "examples/web_triangle",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/zelez-lab/quanta"

[workspace.dependencies]
quanta-ir = { path = "crates/quanta-ir", version = "0.1.0" }

[package]
name = "quanta"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "GPU compute and rendering API — quarks, protons, nuclei, fields"
keywords = ["gpu", "compute", "shader", "metal", "vulkan"]
categories = ["graphics", "hardware-support"]
readme = "README.md"

[features]
default = ["metal"]
std = []
metal = ["std"]
vulkan = ["std"]
## CPU software driver: execute KernelDef IR without GPU hardware.
software = ["std", "jit"]
## Enable JIT compilation: runtime shader emission from embedded KernelDef IR.
jit = ["quanta-ir/jit"]
## WebGPU driver, browser-only (target_arch = "wasm32"). Wired to the
## browser via hand-written `extern "C"` blocks under
## `src/driver/webgpu/ffi.rs`; no external wrapper crate is permitted
## (step 000 policy: no `ash`, `metal-rs`, `objc`, `web-sys`, `wgpu`).
## `wasm-bindgen` is the wasm32 calling-convention bridge and is allowed.
webgpu = ["std", "jit", "dep:wasm-bindgen", "dep:js-sys", "dep:wasm-bindgen-futures"]

[dependencies]
quanta-macros = { path = "crates/quanta-macros", version = "0.1.0" }
quanta-ir.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { version = "0.2", optional = true }
js-sys = { version = "0.3", optional = true }
wasm-bindgen-futures = { version = "0.4", optional = true }

[dev-dependencies]
proptest = "1"
