<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Quanta differential CI — WGSL lane</title>
    <style>
      body { font: 14px ui-monospace, monospace; padding: 1rem; }
      pre  { background: #f6f6f6; padding: 0.5rem; max-height: 18rem; overflow: auto; }
      .ok  { color: #0a0; }
      .fail { color: #a00; }
      ul#kernels { margin: 0; padding-left: 1.5rem; }
    </style>
  </head>
  <body>
    <h1>Quanta differential CI — WGSL lane</h1>
    <p>
      Runs each kernel in <code>tests/diff/kernels/</code> through the
      WebGPU backend and asserts agreement with a JS-side reference
      oracle. Tolerance is per-kernel (≤ 1 ULP for floats, bit-exact
      for ints). Status is PASS only if every kernel verdict passes.
    </p>
    <p id="status">Loading…</p>
    <ul id="kernels"></ul>
    <pre id="output"></pre>

    <script type="module">
      import { instantiate } from "./quanta.js";

      const statusEl  = document.getElementById("status");
      const kernelsEl = document.getElementById("kernels");
      const outEl     = document.getElementById("output");

      // ────────────────────── tolerance helpers ──────────────────────

      function ulpDistance(x, y) {
        if (Number.isNaN(x) || Number.isNaN(y)) return null;
        if (x === y) return 0;
        const sx = Math.sign(x) || (1 / x === Infinity ? 1 : -1);
        const sy = Math.sign(y) || (1 / y === Infinity ? 1 : -1);
        if (sx !== sy) return null;
        const buf = new ArrayBuffer(4);
        const f = new Float32Array(buf);
        const u = new Uint32Array(buf);
        f[0] = x; const xb = u[0];
        f[0] = y; const yb = u[0];
        return xb > yb ? xb - yb : yb - xb;
      }

      function compareF32(oracle, candidate, maxUlps) {
        if (oracle.length !== candidate.length) {
          return { ok: false, detail: `length mismatch: ${oracle.length} vs ${candidate.length}` };
        }
        for (let i = 0; i < oracle.length; i++) {
          const d = ulpDistance(oracle[i], candidate[i]);
          if (d === null) return { ok: false, detail: `index=${i} oracle=${oracle[i]} candidate=${candidate[i]} (NaN or sign-disjoint)` };
          if (d > maxUlps) return { ok: false, detail: `index=${i} oracle=${oracle[i]} candidate=${candidate[i]} ulp_distance=${d} max=${maxUlps}` };
        }
        return { ok: true };
      }

      function compareU32(oracle, candidate) {
        if (oracle.length !== candidate.length) {
          return { ok: false, detail: `length mismatch: ${oracle.length} vs ${candidate.length}` };
        }
        for (let i = 0; i < oracle.length; i++) {
          if (oracle[i] !== candidate[i]) {
            return { ok: false, detail: `index=${i} oracle=${oracle[i]} candidate=${candidate[i]}` };
          }
        }
        return { ok: true };
      }

      // ────────────────────── saxpy oracle ──────────────────────────

      const SAXPY_A = 2.5;
      const SAXPY_N = 1024;
      function saxpyOracle() {
        const xs = new Float32Array(SAXPY_N);
        const ys = new Float32Array(SAXPY_N);
        const out = new Float32Array(SAXPY_N);
        for (let i = 0; i < SAXPY_N; i++) {
          xs[i] = i * 0.125;
          ys[i] = 1.0 - i * 0.0625;
        }
        for (let i = 0; i < SAXPY_N; i++) {
          out[i] = Math.fround(Math.fround(SAXPY_A * xs[i]) + ys[i]);
        }
        return out;
      }

      // ────────────────────── reduce_sum oracle ─────────────────────

      const REDUCE_N = 64;
      function reduceSumOracle() {
        let sum = 0;
        for (let i = 1; i <= REDUCE_N; i++) sum = (sum + i) >>> 0;
        return new Uint32Array([sum]);
      }

      // ────────────────────── counter oracle ────────────────────────

      const COUNTER_N = 128;
      function counterOracle() {
        return new Uint32Array([COUNTER_N]);
      }

      // ────────────────────── runner ────────────────────────────────

      function appendVerdict(name, verdict) {
        const li = document.createElement("li");
        li.textContent = `${name} — ${verdict.ok ? "PASS" : "FAIL " + verdict.detail}`;
        li.className = verdict.ok ? "ok" : "fail";
        kernelsEl.appendChild(li);
        return verdict.ok;
      }

      async function main() {
        const mod = await instantiate("./web_diff.wasm");

        // saxpy
        const saxpyBytes = await mod.runReturningBytes("web_diff_saxpy_run");
        const saxpyCand = new Float32Array(saxpyBytes.buffer, saxpyBytes.byteOffset, saxpyBytes.length / 4);
        const saxpyOk = appendVerdict("saxpy (≤ 1 ULP, N=1024)", compareF32(saxpyOracle(), saxpyCand, 1));

        // reduce_sum
        const reduceBytes = await mod.runReturningBytes("web_diff_reduce_sum_run");
        const reduceCand = new Uint32Array(reduceBytes.buffer, reduceBytes.byteOffset, reduceBytes.length / 4);
        const reduceOracle = reduceSumOracle();
        const reduceOk = appendVerdict("reduce_sum (bit-exact, N=64)", compareU32(reduceOracle, reduceCand));

        // counter
        const counterBytes = await mod.runReturningBytes("web_diff_counter_run");
        const counterCand = new Uint32Array(counterBytes.buffer, counterBytes.byteOffset, counterBytes.length / 4);
        const counterOracleArr = counterOracle();
        const counterOk = appendVerdict("counter (atomic, N=128)", compareU32(counterOracleArr, counterCand));

        const allOk = saxpyOk && reduceOk && counterOk;
        statusEl.className = allOk ? "ok" : "fail";
        statusEl.textContent = allOk
          ? `PASS — 3 / 3 kernels match across the WGSL lane`
          : `FAIL — see per-kernel verdicts below`;

        outEl.textContent =
          `counter oracle:       ${counterOracleArr[0]}\n` +
          `counter candidate:    ${counterCand[0]}\n` +
          `reduce_sum oracle:    ${reduceOracle[0]}\n` +
          `reduce_sum candidate: ${reduceCand[0]}\n` +
          `saxpy oracle[0..4]:    ${Array.from(saxpyOracle().slice(0, 4)).join(", ")}\n` +
          `saxpy candidate[0..4]: ${Array.from(saxpyCand.slice(0, 4)).join(", ")}`;
      }

      main().catch(err => {
        statusEl.className = "fail";
        statusEl.textContent = "FAIL — " + err;
        console.error(err);
      });
    </script>
  </body>
</html>
