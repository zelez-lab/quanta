name: Differential CI (full lanes)

# Step D.5 + D-ext.1 + D-ext.2 of step 077. Runs the differential
# test suite against backends that aren't covered by per-PR CI:
#   - Metal lane on macos-14 (real Apple GPU)
#   - Vulkan lane on ubuntu-latest via Mesa lavapipe (software Vulkan)
#   - AMDGPU lane on a self-hosted Linux runner (real AMD silicon
#     via Mesa radv)
#
# Together with the software lane (host-tests in ci.yml) and the
# WGSL lane (web-smoke.yml), this covers five distinct compute
# backends — three real (Metal, AMDGPU, browser WebGPU) and two
# software (CpuDevice, lavapipe).
#
# Triggers:
#   - `schedule`: nightly cron @ 07:00 UTC (Metal + Vulkan only)
#   - `workflow_dispatch`: manual button in the Actions tab
#   - `pull_request` with the `run-full-diff` label (Metal + Vulkan)
#   - `pull_request` with the `run-amd-diff` label (AMDGPU)
#
# AMDGPU uses a separate label (`run-amd-diff`) rather than
# `run-full-diff` so PRs that don't need it don't accidentally
# block on a missing self-hosted runner.

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, opened, reopened]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Step 063 follow-up — promoted from label-gated to per-PR. The
  # 18 062/063 slices added foundation work (proc-addr loading,
  # capability caches, sparseBinding feature enable, no-silent-drops
  # gates) that needs continuous coverage on real Apple Silicon, not
  # nightly. macos-14 is free for public repos so the cost is just
  # cache reuse. The `run-full-diff` label is no longer required —
  # ordinary PRs get Metal coverage automatically.
  diff-metal:
    # Gated on the `run-metal` PR label until a self-hosted Metal
    # runner is registered. GitHub-hosted macos-14 VMs don't expose
    # the GPU — running this job there panics every Metal test
    # with `NoDevice` after a long build. The cron / dispatch
    # paths used to fire too and burn ~15 min per run for no
    # signal; both removed until a real runner exists.
    if: >-
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'run-metal')
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-14-cargo-diff-full-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-14-cargo-diff-full-
            macos-14-cargo-

      - name: Differential tests (software + metal lanes)
        # `jit` is required: the differential tests construct
        # KernelDef IR at runtime and feed it through wave_jit. The
        # `metal` feature alone leaves wave_jit returning the
        # default trait error "JIT compilation not supported by
        # this driver".
        run: cargo test --test differential --features software,metal,jit

      - name: Op-matrix tests (software + metal lanes)
        # Step 082 Layer 1: same lane set, exhaustive per-op matrix.
        # F64 cases auto-skip on Metal (no `double` type in MSL).
        run: cargo test --test op_matrix --features software,metal,jit

  # Step 063 follow-up — promoted to per-PR alongside diff-metal.
  # lavapipe gives free Vulkan coverage for the foundation slices
  # (proc-addr loading, extension detection, sparse-binding enable,
  # gating). Extension-gated paths (VRS, mesh shaders) stay
  # NotSupported on lavapipe — that's still a useful per-PR signal
  # because it confirms the `is_none()` fallthroughs work.
  diff-vulkan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-diff-vulkan-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-cargo-diff-vulkan-
            ubuntu-cargo-

      # lavapipe = Mesa's software Vulkan implementation. Lets the
      # GitHub-hosted runner (no GPU) expose a Vulkan ICD that the
      # Quanta vulkan driver discovers via `vkCreateInstance` +
      # `vkEnumeratePhysicalDevices`. Validation layers help surface
      # any spec violations the kernel-emitter chain might introduce.
      - name: Install Mesa Vulkan + validation layers
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mesa-vulkan-drivers \
            vulkan-tools \
            libvulkan-dev \
            vulkan-validationlayers

      - name: Locate lavapipe ICD
        run: |
          ICD=$(find /usr/share/vulkan/icd.d/ -name "lvp_icd*.json" | head -1)
          test -n "$ICD" || { echo "::error::lavapipe ICD not found in /usr/share/vulkan/icd.d/"; ls /usr/share/vulkan/icd.d/ || true; exit 1; }
          echo "VK_ICD_FILENAMES=$ICD" >> $GITHUB_ENV
          echo "lavapipe ICD: $ICD"
          VK_ICD_FILENAMES="$ICD" vulkaninfo --summary

      - name: Differential tests (vulkan lane via lavapipe)
        # `compute` + `jit` are BOTH required post crate-split. The tests
        # import `quanta::kernel` and call `wave_jit`/`dispatch`, which live
        # behind the `compute` feature — without it this is a *compile*
        # error (`unresolved import quanta::kernel`), not a runtime
        # NotSupported. `jit` then enables the runtime KernelDef→SPIR-V
        # path. The metal lane gets `compute` transitively via `software`;
        # the vulkan/amdgpu/nvidia lanes must name it explicitly.
        run: cargo test --test differential --no-default-features --features vulkan,jit,compute

      - name: Op-matrix tests (vulkan lane via lavapipe)
        # Step 082 Layer 1 on the SPIR-V emitter path.
        run: cargo test --test op_matrix --no-default-features --features vulkan,jit,compute

  # ─── AMDGPU lane (real-hardware Vulkan via Mesa radv) ────────────────
  #
  # Runs on a self-hosted Linux runner with an AMD GPU. The Quanta
  # vulkan driver code is identical to the lavapipe lane above —
  # only the runner config and ICD selection differ.
  #
  # ## Setup the runner once:
  #
  #   1. Provision a Linux box with an AMD GPU (gfx9+ recommended).
  #   2. Install drivers:
  #        sudo apt-get install \
  #          mesa-vulkan-drivers libvulkan-dev vulkan-tools \
  #          vulkan-validationlayers
  #      Confirm `vulkaninfo --summary` shows `AMD RADV ...`.
  #   3. Register the runner with this repo via Settings → Actions →
  #      Runners → New self-hosted runner.
  #   4. Tag it with all three labels: self-hosted, linux, gpu-amd.
  #   5. Verify with a manual workflow_dispatch — the diff-amdgpu job
  #      should pick up and pass.
  #
  # The job uses `run-amd-diff` (not `run-full-diff`) as its PR-label
  # gate so that ordinary "run the full diff matrix" PR labels don't
  # queue against a runner that may be offline.
  diff-amdgpu:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-amd-diff'))
    runs-on: [self-hosted, linux, gpu-amd]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: amdgpu-cargo-diff-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            amdgpu-cargo-diff-
            amdgpu-cargo-

      - name: Sanity-check the GPU
        run: |
          vulkaninfo --summary
          # Fail fast if no AMD device is exposed — the rest of the
          # job would silently fall through to whichever ICD got
          # picked, which would defeat the purpose.
          vulkaninfo --summary | grep -E "AMD|RADV" || \
            { echo "::error::no AMD/RADV device visible to Vulkan"; exit 1; }

      - name: Differential tests (vulkan lane on real AMDGPU)
        env:
          # Pin to RADV so we don't accidentally fall back to
          # lavapipe if the runner has both ICDs registered.
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/radeon_icd.x86_64.json
        run: cargo test --test differential --no-default-features --features vulkan,jit,compute

      - name: Op-matrix tests (vulkan lane on real AMDGPU)
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/radeon_icd.x86_64.json
        run: cargo test --test op_matrix --no-default-features --features vulkan,jit,compute

  # ─── NVIDIA lane (real-hardware Vulkan via NVIDIA proprietary driver) ───
  #
  # Runs on a self-hosted Linux runner with an NVIDIA GPU. The Quanta
  # vulkan driver code is identical to the lavapipe and AMDGPU lanes —
  # only the runner config and ICD selection differ. Validates that
  # NVIDIA's Vulkan driver accepts our SPIR-V output and produces the
  # expected results on real silicon.
  #
  # Why Vulkan, not CUDA/PTX: the differential test harness (tests/diff/
  # lane.rs) routes through `quanta::init()`, which on Linux+NVIDIA
  # picks up Vulkan through the proprietary `libnvidia` ICD. PTX is
  # only generated as compiler artifact today; running it would
  # require a separate CUDA-runtime test path, which doesn't exist
  # yet. The PTX `ptxas` validation in ci.yml covers PTX *syntax*;
  # this lane covers SPIR-V *execution* on NVIDIA silicon.
  #
  # ## Setup the runner once:
  #
  #   1. Provision a Linux box with an NVIDIA GPU (Turing+ recommended
  #      for Vulkan 1.3 + cooperative-matrix coverage).
  #   2. Install the proprietary driver and Vulkan tools:
  #        sudo apt-get install \
  #          nvidia-driver-550 libvulkan1 vulkan-tools \
  #          libvulkan-dev vulkan-validationlayers
  #      Confirm `vulkaninfo --summary` shows `NVIDIA ...` and
  #      `nvidia-smi` reports the device.
  #   3. Register the runner with this repo via Settings → Actions →
  #      Runners → New self-hosted runner.
  #   4. Tag it with all three labels: self-hosted, linux, gpu-nvidia.
  #   5. Verify with a manual workflow_dispatch — the diff-nvidia job
  #      should pick up and pass.
  #
  # The job uses `run-nvidia-diff` as its PR-label gate so that
  # ordinary "run the full diff matrix" PR labels don't queue against
  # a runner that may be offline.
  diff-nvidia:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-nvidia-diff'))
    runs-on: [self-hosted, linux, gpu-nvidia]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: nvidia-cargo-diff-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            nvidia-cargo-diff-
            nvidia-cargo-

      - name: Sanity-check the GPU
        run: |
          nvidia-smi
          vulkaninfo --summary
          # Fail fast if no NVIDIA device is exposed — the rest of
          # the job would silently fall through to whichever ICD
          # got picked, which would defeat the purpose.
          vulkaninfo --summary | grep -E "NVIDIA" || \
            { echo "::error::no NVIDIA device visible to Vulkan"; exit 1; }

      - name: Differential tests (vulkan lane on real NVIDIA)
        env:
          # Pin to NVIDIA's ICD so we don't accidentally fall back
          # to lavapipe if the runner has both ICDs registered.
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/nvidia_icd.json
        run: cargo test --test differential --no-default-features --features vulkan,jit,compute

      - name: Op-matrix tests (vulkan lane on real NVIDIA)
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/nvidia_icd.json
        run: cargo test --test op_matrix --no-default-features --features vulkan,jit,compute
