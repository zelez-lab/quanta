name: Compiler Dev Binary (per-rev, on demand)

# On-demand per-rev compiler binaries for the rev handshake.
#
# The stale-compiler handshake requires an EXACTLY-matching quanta-compiler
# binary (same QUANTA_BUILD_REV), but the release downloader only serves
# release-TAGGED versions. A fresh machine building a consumer pinned to a
# main-tip rev therefore has no self-serve path short of installing LLVM 22
# locally. This workflow lets a maintainer publish bundled binaries for a
# SPECIFIC rev on demand (one click); the downloader
# (crates/lang/quanta-dsl-core/src/binary.rs) fetches them rev-first.
#
# workflow_dispatch ONLY — this is deliberately NOT a per-push build. A
# maintainer runs it when a consumer needs a rev-exact binary.
#
# The macOS/Linux build and verify jobs share their whole bodies with
# release-compiler.yml through two composite actions —
# .github/actions/bundle-compiler and .github/actions/verify-compiler —
# so the proven LLVM installs, libLLVM-closure staging, and verify pattern
# live in exactly one place; this workflow calls them with embed-rev +
# assert-exact-rev true (the per-rev asset scheme). Windows is INLINE in
# both workflows (its MSYS2 shell cannot live in a composite): it joined
# this dev set when the Windows GPU rig arrived (WINDOWS_RIG.md) — per-rev
# render validation there needs a model-aware compiler for untagged revs,
# and the rig cannot build one locally.
#
# A full commit SHA works as the `ref` input, not just branches and tags:
# the composite checks out with fetch-depth 0, so a bare SHA is resolvable
# (a shallow clone cannot resolve an arbitrary SHA). The same full history
# also keeps `git describe`'s hash abbreviation the same length a consumer's
# checkout produces, so the derived <rev> matches QUANTA_BUILD_REV.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or SHA) to build the compiler from. Defaults to the repository default branch.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          # Windows joined the dev set when the Windows GPU rig arrived
          # (WINDOWS_RIG.md): per-rev render validation on the rig needs a
          # model-aware compiler for untagged revs, and the rig cannot
          # build one (no LLVM 22 there). The Windows steps stay INLINE
          # below — they run under `shell: msys2 {0}`, which the
          # bundle-compiler composite cannot host — mirroring
          # release-compiler.yml's proven pipeline, plus the per-rev
          # naming + exact-rev assertion this workflow contracts.
          - os: windows-2022
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      # Checkout, rev derivation, Rust + LLVM install, build, libLLVM-closure
      # staging, tar.gz packaging, and artifact upload all live in the shared
      # bundle-compiler composite. This workflow's whole reason to exist is the
      # per-rev asset name, so embed-rev + assert-exact-rev are both true: the
      # composite derives <rev> exactly as crates/lang/quanta-compiler/build.rs does
      # (git describe --always --dirty --exclude '*' under a tracked-guard),
      # names the asset quanta-compiler-<rev>-<target>, and asserts the built
      # binary's --rev equals that <rev> before upload — the download-URL
      # contract with crates/lang/quanta-dsl-core/src/binary.rs.
      #
      # fetch-depth: 0 is load-bearing here: it fetches full history so `git
      # describe` (in the composite) abbreviates the commit hash to the same
      # length a consumer's full checkout does (a shallow clone could abbreviate
      # differently and the derived <rev> would not match QUANTA_BUILD_REV). It
      # also makes a bare-SHA `ref` resolvable — so dispatching this workflow
      # against a full commit SHA works, not just branches and tags. The
      # checkout must happen HERE, not inside the composite: a local `uses:`
      # can't be found until the repo is on disk.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - name: Bundle quanta-compiler for this rev
        if: runner.os != 'Windows'
        uses: ./.github/actions/bundle-compiler
        with:
          target: ${{ matrix.target }}
          embed-rev: 'true'
          assert-exact-rev: 'true'

      # ── Windows (zip) stays INLINE below ────────────────────────────
      # Copied from release-compiler.yml's proven MSYS2/UCRT64 pipeline
      # (a composite step cannot host `shell: msys2 {0}`), with the two
      # compiler-dev deltas: the asset embeds <rev> in its name, and the
      # staging smoke test asserts the binary's --rev EQUALS that <rev>.
      - name: Install Rust stable (Windows)
        if: runner.os == 'Windows'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install MSYS2 + LLVM 22 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-llvm
            mingw-w64-ucrt-x86_64-polly
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-lld
            mingw-w64-ucrt-x86_64-gcc

      - name: Wire LLVM_SYS_221_PREFIX (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -e
          LLVM_PREFIX_UNIX=$(llvm-config --prefix)
          echo "llvm-config --prefix → $LLVM_PREFIX_UNIX"
          echo "llvm-config --version → $(llvm-config --version)"
          LLVM_PREFIX_WIN=$(cygpath -w "$LLVM_PREFIX_UNIX")
          BIN_WIN=$(cygpath -w "$LLVM_PREFIX_UNIX/bin")
          GCC_WIN=$(cygpath -w "$LLVM_PREFIX_UNIX/bin/gcc.exe")
          GXX_WIN=$(cygpath -w "$LLVM_PREFIX_UNIX/bin/g++.exe")
          echo "LLVM_SYS_221_PREFIX=$LLVM_PREFIX_WIN" >> $GITHUB_ENV
          echo "MSYS2_GCC=$GCC_WIN" >> $GITHUB_ENV
          echo "MSYS2_GXX=$GXX_WIN" >> $GITHUB_ENV
          echo "$BIN_WIN" >> $GITHUB_PATH

      - name: Switch Rust to GNU triple (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          rustup target add x86_64-pc-windows-gnu --toolchain stable
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=$env:MSYS2_GCC" >> $env:GITHUB_ENV
          echo "CC_x86_64-pc-windows-gnu=$env:MSYS2_GCC" >> $env:GITHUB_ENV
          echo "CXX_x86_64-pc-windows-gnu=$env:MSYS2_GXX" >> $env:GITHUB_ENV
          if (-not (Test-Path $env:MSYS2_GCC)) { Write-Error "MSYS2 gcc not found at $env:MSYS2_GCC"; exit 1 }

      - name: Build quanta-compiler (Windows — GNU build)
        if: runner.os == 'Windows'
        run: cargo build -p quanta-compiler --release --target x86_64-pc-windows-gnu

      # Derive <rev> exactly as build.rs stamps it (checkout above is
      # fetch-depth 0, so the abbreviation length matches a consumer's).
      - name: Derive rev (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          REV=$(git describe --always --dirty --exclude '*')
          echo "derived rev: $REV"
          echo "REV=$REV" >> $GITHUB_ENV

      # Stage exe + non-system DLL closure, then assert the staged
      # binary's --rev EQUALS the derived <rev> — the rev IS the asset
      # name here, so the release-style non-empty gate is not enough.
      - name: Stage archive with bundled DLLs + assert exact rev (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          EXE=target/x86_64-pc-windows-gnu/release/quanta-compiler.exe
          mkdir -p stage
          cp "$EXE" stage/quanta-compiler.exe
          DLL_LINES=$(ldd "$EXE" | grep '=>' | grep -ivE '=> /c/windows/')
          while read -r name _arrow resolved _rest; do
            [ -n "$name" ] || continue
            if [ -f "$resolved" ]; then
              cp "$resolved" "stage/$name"
              echo "bundled $name  <=  $resolved"
            fi
          done <<< "$DLL_LINES"
          ls stage/ | grep -qi 'llvm.*\.dll' || {
            echo "ERROR: no libLLVM DLL copied next to the exe"; ls -la stage/; exit 1; }
          OUT=$(./stage/quanta-compiler.exe --rev)
          echo "staged --rev => $OUT (expected $REV)"
          [ "$OUT" = "$REV" ] || { echo "ERROR: staged binary rev != derived rev"; exit 1; }

      - name: Package per-rev zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "quanta-compiler-$env:REV-${{ matrix.target }}.zip"
          Compress-Archive -Path stage\* -DestinationPath $name
          $hash = (Get-FileHash $name -Algorithm SHA256).Hash.ToLower()
          "$hash  $name" | Out-File -Encoding ASCII "$name.sha256"

      - name: Upload artifact (Windows zip)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: quanta-compiler-${{ matrix.target }}
          path: |
            quanta-compiler-*-${{ matrix.target }}.zip
            quanta-compiler-*-${{ matrix.target }}.zip.sha256
          if-no-files-found: error

  # Prove every archive is self-contained AND that its embedded rev is
  # EXACTLY the <rev> in its name BEFORE it can be published: download each
  # build's artifact onto a CLEAN runner of the same OS — no LLVM, no Rust
  # toolchain — extract it the way a user would, and run the binary. This
  # is stronger than release-compiler.yml's verify (which only asserts
  # non-empty output): here the rev IS the contract, so we assert equality.
  verify:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-2022
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      # Check out at fetch-depth 0 with the same ref as the build job: the
      # composite re-derives <rev> off this history (abbreviation stability),
      # and a local `uses:` needs the repo on disk. Then the composite
      # downloads the quanta-compiler-<rev>-<target> artifact, sha256-verifies
      # it, extracts on a CLEAN runner, and asserts the extracted binary's
      # --rev equals that <rev> (the rev IS the contract here — stronger than
      # release's non-empty gate). The Windows leg re-derives <rev> from the
      # same checkout for its own equality assertion below.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - name: Verify quanta-compiler archive for this rev
        if: runner.os != 'Windows'
        uses: ./.github/actions/verify-compiler
        with:
          target: ${{ matrix.target }}
          embed-rev: 'true'
          assert-exact-rev: 'true'
          ref: ${{ github.event.inputs.ref }}

      # Windows (zip) verify stays INLINE (pwsh Expand-Archive; a composite
      # bash step cannot host it) — and asserts rev EQUALITY, per this
      # workflow's contract.
      - name: Download artifact under test (Windows)
        if: runner.os == 'Windows'
        uses: actions/download-artifact@v4
        with:
          name: quanta-compiler-${{ matrix.target }}
          path: dl

      - name: Extract and assert exact rev (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $rev = (git describe --always --dirty --exclude '*').Trim()
          Write-Host "expected rev: $rev"
          cd dl
          $zip = "quanta-compiler-$rev-${{ matrix.target }}.zip"
          if (-not (Test-Path $zip)) {
            Write-Error "expected asset $zip not found"; Get-ChildItem; exit 1
          }
          $expected = (Get-Content "$zip.sha256").Split(' ')[0].Trim()
          $actual = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          if ($expected -ne $actual) {
            Write-Error "sha256 mismatch: expected $expected, got $actual"; exit 1
          }
          Expand-Archive -Path $zip -DestinationPath extracted -Force
          $out = (& ".\extracted\quanta-compiler.exe" --rev | Out-String).Trim()
          Write-Host "quanta-compiler --rev => $out"
          if ($out -ne $rev) {
            Write-Error "rev mismatch: asset says $rev, binary says $out"; exit 1
          }

  # Publish all six files as assets of a ROLLING prerelease tagged
  # `compiler-dev`, then prune to the 10 most-recent revs. Uses `gh`
  # (preinstalled on GitHub runners) with the workflow's GITHUB_TOKEN.
  publish:
    needs: [build, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # A checkout so `gh release` has a repo context to talk to. Shallow
      # is fine here — publish/prune never derive <rev> from git, they read
      # it off the asset filenames the build job produced.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten artifacts
        run: |
          # actions/upload-artifact@v4 keeps the path-relative-to-LCA
          # structure, so archives may arrive nested. Flatten so the
          # upload sees the files directly.
          mkdir -p dist
          find artifacts -type f \( -name 'quanta-compiler-*.tar.gz' \
                                  -o -name 'quanta-compiler-*.tar.gz.sha256' \
                                  -o -name 'quanta-compiler-*.zip' \
                                  -o -name 'quanta-compiler-*.zip.sha256' \) \
            -exec cp {} dist/ \;
          echo "--- files to publish ---"
          ls -la dist/

      # Create the rolling prerelease once; reuse it forever after. It is
      # NOT tied to a version tag — it is a moving bucket of per-rev dev
      # binaries whose assets are pruned. `gh release view` exits non-zero
      # when the release is absent, which is our "create it" signal.
      - name: Ensure the compiler-dev prerelease exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view compiler-dev >/dev/null 2>&1; then
            echo "compiler-dev prerelease already exists"
          else
            echo "creating the compiler-dev rolling prerelease"
            gh release create compiler-dev \
              --prerelease \
              --title "Compiler dev binaries (rolling, per-rev)" \
              --notes "$(cat <<'EOF'
          On-demand, per-rev **quanta-compiler** binaries for the stale-compiler
          rev handshake. A maintainer publishes these from a specific checkout via
          **Actions -> Compiler Dev Binary (per-rev, on demand) -> Run workflow ->
          ref**; the Quanta build macros (crates/lang/quanta-dsl-core) download the
          rev-exact archive automatically when your consumer pins a main-tip rev.

          Assets are named `quanta-compiler-<rev>-<target>.tar.gz` (+ `.sha256`),
          where `<rev>` is the `git describe --always --dirty --exclude '*'` stamp
          the compiler reports via `--rev`. Only the **10 most-recent revs** are
          kept here — this is a moving window, not an archive. For a stable,
          version-tagged binary use a tagged GitHub Release instead.
          EOF
          )"
          fi

      # Upload this run's eight files. --clobber so re-running the workflow
      # for the same rev replaces rather than errors on existing assets.
      - name: Upload this rev's assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload compiler-dev dist/* --clobber
          echo "uploaded $(ls dist/ | wc -l) files to compiler-dev"

      # Prune: keep the assets of the 10 most-recent revs, delete older
      # groups. "Recent" = most-recently uploaded: we sort the release's
      # assets by createdAt (newest first), collect distinct <rev> segments
      # in that order, keep the first 10, and delete every asset whose rev
      # is not in the keep set. Grouping by <rev> means an entire rev's
      # 8-file set (4 targets x {archive, sha256}) is kept or dropped
      # together.
      - name: Prune to the 10 most-recent revs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Pull the asset list newest-first. gh exposes createdAt and name
          # per asset; jq sorts and emits "name" lines.
          ASSETS=$(gh release view compiler-dev \
            --json assets \
            --jq '.assets | sort_by(.createdAt) | reverse | .[].name')
          if [ -z "$ASSETS" ]; then
            echo "no assets on compiler-dev; nothing to prune"
            exit 0
          fi
          echo "--- assets newest-first ---"
          echo "$ASSETS"
          # Derive the <rev> of each asset by stripping the fixed
          # "quanta-compiler-" prefix and everything from the target triple
          # onward. The triple always starts with one of the three known
          # arch-os stems, so cut at "-<arch>-" boundaries. Simplest robust
          # form: remove the known suffixes.
          rev_of() {
            local n="$1"
            # strip leading prefix
            n="${n#quanta-compiler-}"
            # strip from the first known target triple onward
            n="${n%%-aarch64-apple-darwin*}"
            n="${n%%-x86_64-unknown-linux-gnu*}"
            n="${n%%-aarch64-unknown-linux-gnu*}"
            n="${n%%-x86_64-pc-windows-msvc*}"
            printf '%s' "$n"
          }
          # Ordered, de-duplicated rev list (newest-first). Kept as
          # newline-delimited strings + `grep -Fxq` membership rather than
          # bash associative arrays, so the logic is portable to any bash
          # (no `declare -A` dependency) and testable outside the runner.
          DISTINCT_REVS=""
          while IFS= read -r asset; do
            [ -n "$asset" ] || continue
            rev="$(rev_of "$asset")"
            [ -n "$rev" ] || continue
            # Append rev the first time we see it — DISTINCT_REVS ends up
            # in newest-first order because ASSETS already is.
            if ! printf '%s\n' "$DISTINCT_REVS" | grep -Fxq -- "$rev"; then
              DISTINCT_REVS="${DISTINCT_REVS:+$DISTINCT_REVS
          }$rev"
            fi
          done <<< "$ASSETS"
          # Keep the first 10 distinct revs; those are the ones to retain.
          KEEP_REVS=$(printf '%s\n' "$DISTINCT_REVS" | grep -v '^$' | head -n 10)
          KEEP_COUNT=$(printf '%s\n' "$KEEP_REVS" | grep -c . || true)
          echo "--- keeping the ${KEEP_COUNT} most-recent revs: ---"
          echo "$KEEP_REVS"
          # Delete every asset whose rev is not in the keep set.
          while IFS= read -r asset; do
            [ -n "$asset" ] || continue
            rev="$(rev_of "$asset")"
            [ -n "$rev" ] || continue
            if ! printf '%s\n' "$KEEP_REVS" | grep -Fxq -- "$rev"; then
              echo "pruning $asset (rev $rev)"
              gh release delete-asset compiler-dev "$asset" --yes
            fi
          done <<< "$ASSETS"
          echo "prune complete"
