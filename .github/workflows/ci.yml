name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  LLVM_PREFIX: /opt/homebrew/opt/llvm@22

jobs:
  # ─── Tier 1: Host tests (no GPU, runs everywhere) ────────────────────
  # Windows is included for compile + headless-test coverage. GitHub
  # Windows runners don't expose a GPU, so the differential software
  # lane is what actually exercises the kernel-execution path on
  # Windows. Real Windows + Vulkan/DX execution stays deferred until
  # a self-hosted Windows GPU runner is registered.
  host-tests:
    strategy:
      matrix:
        os: [macos-14, ubuntu-latest, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build

      # MoltenVK-trap regression. The default features are
      # `metal, vulkan, render, compute`, and default-enabling `vulkan`
      # is only safe because the Vulkan code (module, discovery, the
      # `#[link(name = "vulkan")]` stanza) is cfg(target_os)-gated out of
      # Apple targets. If that gate ever regresses, a plain macOS build
      # starts demanding a Vulkan loader and fails at link. This step
      # proves the default one-liner builds per-OS: Vulkan-pruned on
      # macOS (no libvulkan needed), Vulkan-active on Linux/Windows.
      - name: Default-features build (MoltenVK-trap regression)
        shell: bash
        run: |
          cargo build -p quanta
          echo "ok: default-features (metal, vulkan, render, compute) build the right face on ${{ runner.os }}"

      # Compute/render boundary: all four feature quadrants must build
      # in isolation (core-only / render / compute / both). Guards the
      # crate-split boundary — a render file reaching for a compute
      # type (or vice versa) fails here, not during the extraction.
      - name: Feature-combo matrix (core / render / compute / both)
        run: |
          cargo build -p quanta --no-default-features --features metal
          cargo build -p quanta --no-default-features --features "metal render"
          cargo build -p quanta --no-default-features --features "metal compute jit"
          cargo build -p quanta --no-default-features --features "metal render compute jit"

      # The crate-split graph guarantee: quanta-render's dependency
      # tree must never contain the compute stack (kernel lowering,
      # wasmparser, the quanta-ir JIT). A render-only consumer that
      # depends on quanta-render structurally cannot pull it.
      - name: Render dependency-graph guard (no compute stack)
        shell: bash
        run: |
          if cargo tree -p quanta-render -e normal | grep -iE 'wasm|jit'; then
            echo "ERROR: quanta-render pulled the compute stack (wasm/jit)" >&2
            exit 1
          fi
          echo "ok: quanta-render tree is free of the compute stack"

      # These are pure host-side tests (wire, type inference, emitter text —
      # no device is ever created). Run them WITHOUT a GPU backend: since
      # `vulkan` joined the default features, a test binary built with
      # defaults links the Vulkan loader on Linux/Windows, which host
      # runners don't have. `render compute` gives the macro + emitter
      # surface these tests need and links no driver, so the step is
      # identical on every OS — and it enables the feature-gated cases the
      # old default run silently skipped.
      - name: Host tests (wire, types, shader, emitter, gpu_type, wave)
        run: |
          cargo test --test host_wire --no-default-features --features "render compute"
          cargo test --test host_types --no-default-features --features "render compute"
          cargo test --test host_shader --no-default-features --features "render compute"
          cargo test --test host_emitter --no-default-features --features "render compute"
          cargo test --test host_gpu_type --no-default-features --features "render compute"
          cargo test --test host_wave --no-default-features --features "render compute"

      - name: IR roundtrip tests
        run: cargo test -p quanta-ir

      # Step D / Step 077: differential CI. Software lane runs on every
      # PR via the `software` feature. WGSL lane runs in `web-smoke.yml`.
      # Metal nightly + label-gated lanes land in D.5.
      - name: Differential tests (software lane)
        run: cargo test --test differential --features software --no-default-features

      # Step 082 Layer 1: per-op differential matrix. Same software
      # lane as above — every (BinOp, UnaryOp, CmpOp, Cast) × scalar
      # type × edge-input triple must agree bit-exact (or ≤ max_ulps
      # for float Div) with the CPU reference. Metal/Vulkan lanes
      # extend in diff-full.yml.
      - name: Op-matrix tests (software lane)
        run: cargo test --test op_matrix --features software --no-default-features

      # Loop/branch/break control-flow reconstruction regression net. Each
      # case runs under a 30s watchdog so a dropped loop-exit Break (which
      # spins the structured Loop to its sentinel bound) fails instead of
      # wedging the runner. Covers the k1_bin double-sentinel miscompile.
      - name: Lowering loop-shape tests (software lane)
        run: cargo test --test lowering_loops --features software --no-default-features

  # ─── Tier 2: GPU tests (macOS Metal) ─────────────────────────────────
  # Gated on the `run-metal` PR label until a self-hosted Metal runner
  # is registered. GitHub-hosted macos-14 VMs don't expose the GPU.
  gpu-tests-metal:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-metal'))
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-14-cargo-gpu-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build

      - name: GPU compute tests
        run: cargo test --test gpu_compute --test gpu_atomics --test gpu_shared -- --test-threads=1

      - name: GPU texture tests
        run: cargo test --test gpu_texture -- --test-threads=1

      - name: GPU render tests
        run: cargo test --test gpu_render --test gpu_pipeline --test gpu_mrt --test gpu_resolve -- --test-threads=1

      - name: GPU resource tests
        run: cargo test --test gpu_barriers --test gpu_mapped --test gpu_timestamps -- --test-threads=1

      - name: GPU lifecycle tests
        run: cargo test --test gpu_caps --test gpu_field_lifecycle --test gpu_pulse --test gpu_sampler --test gpu_format_caps -- --test-threads=1

      - name: GPU advanced tests
        run: cargo test --test gpu_advanced --test gpu_queue --test gpu_timeline --test gpu_texture_views --test gpu_occlusion --test gpu_indirect_dispatch --test gpu_debug --test gpu_reload -- --test-threads=1

      - name: GPU indirect-command-buffer tests (render bundle)
        run: cargo test --test icb_render_metal -- --test-threads=1

      # DSL draw tests need the compiler on PATH: the shader macros shell out
      # to it to embed the metallib, so without it every DSL draw ships
      # binary-less and self-skips. Build it here (same llvm@22 the
      # compiler-validation lane uses) and point QUANTA_COMPILER at it.
      - name: Install LLVM 22 (for quanta-compiler)
        run: brew install llvm@22

      - name: Build quanta-compiler
        env:
          LLVM_SYS_221_PREFIX: /opt/homebrew/opt/llvm@22
        run: cargo build -p quanta-compiler

      - name: DSL draw tests (metal)
        env:
          QUANTA_COMPILER: ${{ github.workspace }}/target/debug/quanta-compiler
        run: |
          cargo test --test render_triangle_test --features metal,render -- --test-threads=1
          cargo test --test texture_write_region --features metal,render -- --test-threads=1
          cargo test --test shader_parity_draw --features metal,render -- --test-threads=1
          cargo test --test icb_metal --features metal,compute -- --test-threads=1

  # ─── Metal validation layer ──────────────────────────────────────────
  # Same gate as gpu-tests-metal — needs real Metal hardware.
  metal-validation:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-metal'))
    runs-on: macos-14
    needs: gpu-tests-metal
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-14-cargo-gpu-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --tests

      - name: Run with Metal validation layer
        env:
          MTL_DEBUG_LAYER: "1"
          MTL_SHADER_VALIDATION: "1"
        run: cargo test --test gpu_compute --test gpu_atomics --test gpu_texture --test gpu_render -- --test-threads=1

  # ─── LLVM compiler + SPIR-V validation ───────────────────────────────
  compiler-validation:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install LLVM 22
        run: brew install llvm@22

      - name: Install spirv-tools
        run: brew install spirv-tools

      - name: Install naga (WGSL validation)
        run: brew install naga-cli || cargo install naga-cli --locked

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-14-cargo-compiler-${{ hashFiles('**/Cargo.lock') }}

      - name: Build compiler
        env:
          LLVM_SYS_221_PREFIX: /opt/homebrew/opt/llvm@22
        run: cargo build -p quanta-compiler

      # NOTE: neither file has #[ignore] tests — `-- --ignored` ran
      # ZERO tests here for months. Run them for real.
      - name: Compiler output validation (PTX, SPIR-V, AMD, IR)
        run: cargo test --test validate_compiler_output

      - name: SPIR-V validation via spirv-val
        run: cargo test --test validate_spirv

  # ─── PTX validation via ptxas (Linux + CUDA) ─────────────────────────
  ptx-validation:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.4.1-devel-ubuntu22.04
    steps:
      - uses: actions/checkout@v7

      - name: Install deps
        run: |
          apt-get update && apt-get install -y curl build-essential pkg-config
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          . $HOME/.cargo/env
          rustup target add wasm32-unknown-unknown

      - name: Install LLVM 22
        run: |
          apt-get install -y lsb-release wget software-properties-common gnupg
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          ./llvm.sh 22
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> $GITHUB_ENV

      - name: Build compiler
        run: |
          . $HOME/.cargo/env
          cargo build -p quanta-compiler

      - name: Generate PTX and validate with ptxas
        run: |
          . $HOME/.cargo/env
          DYLD_LIBRARY_PATH=/usr/lib/llvm-22/lib cargo run -p quanta-compiler -- --test-ptx > /tmp/kernel.ptx
          ptxas -arch sm_50 /tmp/kernel.ptx -o /dev/null
          echo "ptxas validation passed"

  # ─── Performance regression gate (step 069) ─────────────────────────
  # Gated on the `run-perf` PR label until a self-hosted Metal runner
  # is registered. GitHub-hosted macos-14 VMs don't expose the GPU,
  # so `quanta::init()` fails with NoDevice. Apply the label manually
  # before merging anything that touches perf-sensitive paths.
  perf-regression:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-perf'))
    runs-on: macos-14
    needs: gpu-tests-metal
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-14-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks
        run: cargo run --release -p quanta-bench -- run --out /tmp/quanta-bench-current.json

      - name: Compare against baseline
        # Threshold widened to 25% in CI (shared runners are noisy). Tighten
        # locally with `just bench-check` for tighter regression detection.
        run: cargo run --release -p quanta-bench -- compare --baseline bench/baselines/macos-aarch64.json --current /tmp/quanta-bench-current.json --threshold 25

      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-macos
          path: /tmp/quanta-bench-current.json

  # ─── Bench harness build (Linux, no GPU) ─────────────────────────────
  # Validates the bench harness compiles on a machine without Metal/Vulkan.
  # Actual perf measurement is done in `perf-regression` on macos-14.
  perf-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Build bench harness (no metal/vulkan)
        run: cargo build --release -p quanta-bench --no-default-features

      - name: Verify --help runs
        run: cargo run --release -p quanta-bench --no-default-features -- --help

  # ─── Clippy + fmt ────────────────────────────────────────────────────
  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

  # ─── Compute/render separation invariants (step 085) ─────────────────
  # The compute/render boundary is the `render` Cargo feature. Two checks
  # keep it from regressing:
  #   1. Surface-disjointness — with render OFF, no render type name is
  #      reachable from quanta's public surface (rustdoc-JSON membership).
  #   2. Dependency-acyclicity — no quanta -> quanta-render edge.
  # Plus: the headless_compute fixture builds + runs on `quanta` alone with
  # render off, and its dependency tree contains no quanta-render.
  render-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust (stable + nightly for rustdoc JSON)
        uses: dtolnay/rust-toolchain@stable
        with:
          # headless-compute runs `#[quanta::kernel]`, which compiles the
          # kernel body to wasm32 at build time — the target must be present.
          targets: wasm32-unknown-unknown
      - name: Add nightly
        run: rustup toolchain install nightly --profile minimal

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-boundary-${{ hashFiles('**/Cargo.lock') }}

      - name: Render-boundary invariants (disjointness + acyclicity)
        run: ./scripts/check-render-boundary.sh

      - name: Headless compute fixture builds + runs (quanta alone, render off)
        run: cargo run -p headless-compute

      - name: Headless tree has no quanta-render
        run: |
          if cargo tree -p headless-compute | grep -q quanta-render; then
            echo "::error::headless-compute pulls quanta-render"; exit 1
          fi
          echo "ok: headless-compute tree is render-free"

  # ─── Vulkan SPIR-V lane via lavapipe (per-PR) ────────────────────────
  #
  # The software lane in host-tests doesn't exercise the SPIR-V emitter,
  # so emitter bugs (wrong opcodes, missing capabilities) only surface on
  # a real Vulkan driver. lavapipe is Mesa's software Vulkan ICD: it lets
  # a GPU-less runner build and dispatch the emitted SPIR-V and compare
  # results against the CPU reference. The full hardware matrix (AMDGPU /
  # NVIDIA) runs nightly in diff-full.yml; this is the per-PR guard.
  gpu-tests-vulkan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-vulkan-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-cargo-vulkan-
            ubuntu-cargo-

      - name: Install Mesa Vulkan + validation layers
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mesa-vulkan-drivers \
            vulkan-tools \
            libvulkan-dev \
            vulkan-validationlayers

      - name: Locate lavapipe ICD
        run: |
          ICD=$(find /usr/share/vulkan/icd.d/ -name "lvp_icd*.json" | head -1)
          test -n "$ICD" || { echo "::error::lavapipe ICD not found in /usr/share/vulkan/icd.d/"; ls /usr/share/vulkan/icd.d/ || true; exit 1; }
          echo "VK_ICD_FILENAMES=$ICD" >> $GITHUB_ENV
          echo "lavapipe ICD: $ICD"
          VK_ICD_FILENAMES="$ICD" vulkaninfo --summary

      # `jit` is required: op_matrix + differential build KernelDef IR at
      # runtime and feed it through wave_jit (the SPIR-V emitter path).
      - name: Op-matrix tests (vulkan lane via lavapipe)
        run: cargo test --test op_matrix --no-default-features --features vulkan,jit,compute

      - name: Differential tests (vulkan lane via lavapipe)
        run: cargo test --test differential --no-default-features --features vulkan,jit,compute

      # The swapchain path: VK_EXT_headless_surface gives lavapipe a real
      # VkSurfaceKHR + VkSwapchainKHR without a window system, so the
      # whole acquire→render→present suite (incl. the demand-driven
      # pacing contract) runs here. Skips gracefully if the loader
      # lacks the WSI extensions.
      - name: Surface tests (vulkan lane via lavapipe headless swapchain)
        run: cargo test --test gpu_surface --no-default-features --features vulkan,render

      # DSL draw tests on a real Vulkan device: build quanta-compiler so
      # the shader macros embed SPIR-V, then run the render suites on
      # lavapipe — the only lane that executes DSL shaders (uniforms,
      # statement-ifs, texture sampling) on Vulkan at runtime.
      - name: Install LLVM 22 (for quanta-compiler)
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> $GITHUB_ENV

      - name: Build quanta-compiler
        run: cargo build -p quanta-compiler

      - name: DSL render tests (vulkan lane via lavapipe)
        env:
          QUANTA_COMPILER: ${{ github.workspace }}/target/debug/quanta-compiler
          LD_LIBRARY_PATH: /usr/lib/llvm-22/lib
        run: |
          cargo test --test render_triangle_test --no-default-features --features vulkan,render
          cargo test --test texture_write_region --no-default-features --features vulkan,render
          cargo test --test shader_parity_draw --no-default-features --features vulkan,render
          cargo test --test gpu_texture_compute --no-default-features --features vulkan,jit,compute
          cargo test --test vulkan_sampler_cache --no-default-features --features vulkan,render
          cargo test --test vulkan_scissor_clamp --no-default-features --features vulkan,render
          cargo test --test vulkan_failed_pipeline --no-default-features --features vulkan,render
          cargo test --test vulkan_msaa_resolve_sample --no-default-features --features vulkan,render
          cargo test --test icb_vulkan --no-default-features --features vulkan,jit,compute
