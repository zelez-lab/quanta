name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  LLVM_PREFIX: /opt/homebrew/opt/llvm@22

jobs:
  # ─── Tier 1: Host tests (no GPU, runs everywhere) ────────────────────
  # Windows is included for compile + headless-test coverage. GitHub
  # Windows runners don't expose a GPU, so the differential software
  # lane is what actually exercises the kernel-execution path on
  # Windows. Real Windows + Vulkan/DX execution stays deferred until
  # a self-hosted Windows GPU runner is registered.
  host-tests:
    strategy:
      matrix:
        os: [macos-14, ubuntu-latest, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build

      - name: Host tests (wire, types, shader, emitter, gpu_type, wave)
        run: |
          cargo test --test host_wire
          cargo test --test host_types
          cargo test --test host_shader
          cargo test --test host_emitter
          cargo test --test host_gpu_type
          cargo test --test host_wave

      - name: IR roundtrip tests
        run: cargo test -p quanta-ir

      # Step D / Step 077: differential CI. Software lane runs on every
      # PR via the `software` feature. WGSL lane runs in `web-smoke.yml`.
      # Metal nightly + label-gated lanes land in D.5.
      - name: Differential tests (software lane)
        run: cargo test --test differential --features software --no-default-features

  # ─── Tier 2: GPU tests (macOS Metal) ─────────────────────────────────
  # Gated on the `run-metal` PR label until a self-hosted Metal runner
  # is registered. GitHub-hosted macos-14 VMs don't expose the GPU.
  gpu-tests-metal:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-metal'))
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-14-cargo-gpu-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build

      - name: GPU compute tests
        run: cargo test --test gpu_compute --test gpu_atomics --test gpu_shared -- --test-threads=1

      - name: GPU texture tests
        run: cargo test --test gpu_texture -- --test-threads=1

      - name: GPU render tests
        run: cargo test --test gpu_render --test gpu_pipeline --test gpu_mrt --test gpu_resolve -- --test-threads=1

      - name: GPU resource tests
        run: cargo test --test gpu_barriers --test gpu_mapped --test gpu_timestamps -- --test-threads=1

      - name: GPU lifecycle tests
        run: cargo test --test gpu_caps --test gpu_field_lifecycle --test gpu_pulse --test gpu_sampler --test gpu_format_caps -- --test-threads=1

      - name: GPU advanced tests
        run: cargo test --test gpu_advanced --test gpu_queue --test gpu_timeline --test gpu_texture_views --test gpu_occlusion --test gpu_indirect_dispatch --test gpu_debug --test gpu_reload -- --test-threads=1

  # ─── Metal validation layer ──────────────────────────────────────────
  # Same gate as gpu-tests-metal — needs real Metal hardware.
  metal-validation:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-metal'))
    runs-on: macos-14
    needs: gpu-tests-metal
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-14-cargo-gpu-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --tests

      - name: Run with Metal validation layer
        env:
          MTL_DEBUG_LAYER: "1"
          MTL_SHADER_VALIDATION: "1"
        run: cargo test --test gpu_compute --test gpu_atomics --test gpu_texture --test gpu_render -- --test-threads=1

  # ─── LLVM compiler + SPIR-V validation ───────────────────────────────
  compiler-validation:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 22
        run: brew install llvm@22

      - name: Install spirv-tools
        run: brew install spirv-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-14-cargo-compiler-${{ hashFiles('**/Cargo.lock') }}

      - name: Build compiler
        env:
          LLVM_SYS_221_PREFIX: /opt/homebrew/opt/llvm@22
        run: cargo build -p quanta-compiler

      - name: Compiler output validation (PTX, SPIR-V, AMD, IR)
        run: cargo test --test validate_compiler_output -- --ignored

      - name: SPIR-V validation via spirv-val
        run: cargo test --test validate_spirv -- --ignored

  # ─── PTX validation via ptxas (Linux + CUDA) ─────────────────────────
  ptx-validation:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.4.1-devel-ubuntu22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          apt-get update && apt-get install -y curl build-essential pkg-config
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install LLVM 22
        run: |
          apt-get install -y lsb-release wget software-properties-common gnupg
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          ./llvm.sh 22
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> $GITHUB_ENV

      - name: Build compiler
        run: |
          . $HOME/.cargo/env
          cargo build -p quanta-compiler

      - name: Generate PTX and validate with ptxas
        run: |
          . $HOME/.cargo/env
          DYLD_LIBRARY_PATH=/usr/lib/llvm-22/lib cargo run -p quanta-compiler -- --test-ptx > /tmp/kernel.ptx
          ptxas -arch sm_50 /tmp/kernel.ptx -o /dev/null
          echo "ptxas validation passed"

  # ─── Performance regression gate (step 069) ─────────────────────────
  # Gated on the `run-perf` PR label until a self-hosted Metal runner
  # is registered. GitHub-hosted macos-14 VMs don't expose the GPU,
  # so `quanta::init()` fails with NoDevice. Apply the label manually
  # before merging anything that touches perf-sensitive paths.
  perf-regression:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'run-perf'))
    runs-on: macos-14
    needs: gpu-tests-metal
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-14-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks
        run: cargo run --release -p quanta-bench -- run --out /tmp/quanta-bench-current.json

      - name: Compare against baseline
        # Threshold widened to 25% in CI (shared runners are noisy). Tighten
        # locally with `just bench-check` for tighter regression detection.
        run: cargo run --release -p quanta-bench -- compare --baseline bench/baselines/macos-aarch64.json --current /tmp/quanta-bench-current.json --threshold 25

      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-macos
          path: /tmp/quanta-bench-current.json

  # ─── Bench harness build (Linux, no GPU) ─────────────────────────────
  # Validates the bench harness compiles on a machine without Metal/Vulkan.
  # Actual perf measurement is done in `perf-regression` on macos-14.
  perf-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Build bench harness (no metal/vulkan)
        run: cargo build --release -p quanta-bench --no-default-features

      - name: Verify --help runs
        run: cargo run --release -p quanta-bench --no-default-features -- --help

  # ─── Clippy + fmt ────────────────────────────────────────────────────
  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings
