name: Release Compiler Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: zip
          # macOS Intel (macos-13 deprecated; macos-13-large is paid)
          # is deferred. Native ARM Linux runner above covers Pi 5 +
          # Graviton + UTM-Ubuntu users.

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install LLVM 22 (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install llvm@22
          echo "LLVM_SYS_221_PREFIX=$(brew --prefix llvm@22)" >> $GITHUB_ENV

      - name: Install LLVM 22 (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          # Use the apt.llvm.org repo matching the runner's Ubuntu
          # codename (lsb_release -cs). Works for jammy (22.04) and
          # noble (24.04) on both x86_64 and arm64.
          CODENAME=$(lsb_release -cs)
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/${CODENAME}/ llvm-toolchain-${CODENAME}-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-22-dev libpolly-22-dev
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> $GITHUB_ENV

      # MSYS2 is the only practical source of `llvm-sys`-compatible
      # LLVM dev packages on Windows runners. The official LLVM Windows
      # release ships clang/lld/lldb but not the static libs + headers
      # `llvm-sys` needs. Chocolatey is in the same boat.
      #
      # UCRT64 (not CLANG64) is required: Rust's `x86_64-pc-windows-gnu`
      # toolchain links against `libgcc`/`libgcc_eh`, which CLANG64
      # doesn't ship (it uses compiler-rt). UCRT64 gives us GCC's
      # MinGW runtime AND LLVM 22 dev libs side by side.
      - name: Install MSYS2 + LLVM 22 (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-llvm
            mingw-w64-ucrt-x86_64-polly
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-lld
            mingw-w64-ucrt-x86_64-gcc

      - name: Wire LLVM_SYS_221_PREFIX (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: msys2 {0}
        run: |
          set -e
          # Resolve the actual install prefix from llvm-config rather
          # than guessing — msys2/setup-msys2 may install to a path
          # other than C:\msys64.
          LLVM_PREFIX_UNIX=$(llvm-config --prefix)
          echo "llvm-config --prefix → $LLVM_PREFIX_UNIX"
          echo "llvm-config --version → $(llvm-config --version)"
          ls -la "$LLVM_PREFIX_UNIX/bin/llvm-config"* || true
          ls "$LLVM_PREFIX_UNIX/lib/" | head -20 || true
          # Convert MSYS2 path (/clang64/...) to a Windows path so the
          # rust toolchain (running outside MSYS2) finds it.
          LLVM_PREFIX_WIN=$(cygpath -w "$LLVM_PREFIX_UNIX")
          BIN_WIN=$(cygpath -w "$LLVM_PREFIX_UNIX/bin")
          # The GNU triple expects gcc as the linker driver — it knows
          # how to find libgcc/libgcc_eh, where clang on its own does
          # not. Both ship in UCRT64.
          GCC_WIN=$(cygpath -w "$LLVM_PREFIX_UNIX/bin/gcc.exe")
          GXX_WIN=$(cygpath -w "$LLVM_PREFIX_UNIX/bin/g++.exe")
          echo "Windows prefix: $LLVM_PREFIX_WIN"
          echo "Windows gcc:    $GCC_WIN"
          echo "LLVM_SYS_221_PREFIX=$LLVM_PREFIX_WIN" >> $GITHUB_ENV
          echo "MSYS2_GCC=$GCC_WIN" >> $GITHUB_ENV
          echo "MSYS2_GXX=$GXX_WIN" >> $GITHUB_ENV
          echo "$BIN_WIN" >> $GITHUB_PATH

      - name: Verify LLVM is reachable from pwsh (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          echo "LLVM_SYS_221_PREFIX = $env:LLVM_SYS_221_PREFIX"
          if (Test-Path "$env:LLVM_SYS_221_PREFIX\bin\llvm-config.exe") {
            & "$env:LLVM_SYS_221_PREFIX\bin\llvm-config.exe" --version
            & "$env:LLVM_SYS_221_PREFIX\bin\llvm-config.exe" --libdir
          } else {
            Write-Error "llvm-config.exe NOT found at $env:LLVM_SYS_221_PREFIX\bin\"
            Get-ChildItem "$env:LLVM_SYS_221_PREFIX" -ErrorAction SilentlyContinue
            exit 1
          }

      # MSYS2 CLANG64 is a MinGW-w64/GNU toolchain. Rust's default
      # Windows host (`x86_64-pc-windows-msvc`) uses the MSVC ABI and
      # is incompatible. Build with the GNU triple so the LLVM libs
      # MSYS2 ships actually link.
      - name: Switch Rust to GNU triple (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          rustup target add x86_64-pc-windows-gnu --toolchain stable
          # Pin cargo to the MSYS2 UCRT64 gcc resolved in the previous
          # step via llvm-config — works regardless of where
          # setup-msys2 installed.
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=$env:MSYS2_GCC" >> $env:GITHUB_ENV
          echo "CC_x86_64-pc-windows-gnu=$env:MSYS2_GCC" >> $env:GITHUB_ENV
          echo "CXX_x86_64-pc-windows-gnu=$env:MSYS2_GXX" >> $env:GITHUB_ENV
          # Sanity-check the gcc the next step will use.
          if (Test-Path $env:MSYS2_GCC) {
            & $env:MSYS2_GCC --version
          } else {
            Write-Error "MSYS2 gcc not found at $env:MSYS2_GCC"
            exit 1
          }

      - name: Build quanta-compiler (Linux/macOS — MSVC-style host)
        if: ${{ !startsWith(matrix.os, 'windows') }}
        run: cargo build -p quanta-compiler --release

      # Windows: build through the GNU triple because MSYS2's LLVM is
      # MinGW/GNU. The output .exe is standalone and runs on any
      # Windows; the asset is named using the MSVC matrix.target so
      # the downloader's `current_target()` lookup matches what most
      # Windows users default to.
      - name: Build quanta-compiler (Windows — GNU build)
        if: startsWith(matrix.os, 'windows')
        run: cargo build -p quanta-compiler --release --target x86_64-pc-windows-gnu

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd target/release
          tar czf quanta-compiler-${{ matrix.target }}.tar.gz quanta-compiler
          # macOS doesn't ship `sha256sum`; `shasum -a 256` exists on
          # both macOS and Linux.
          if command -v sha256sum >/dev/null; then
            sha256sum quanta-compiler-${{ matrix.target }}.tar.gz \
              > quanta-compiler-${{ matrix.target }}.tar.gz.sha256
          else
            shasum -a 256 quanta-compiler-${{ matrix.target }}.tar.gz \
              > quanta-compiler-${{ matrix.target }}.tar.gz.sha256
          fi

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          # GNU build lands under target/x86_64-pc-windows-gnu/release/.
          cd target\x86_64-pc-windows-gnu\release
          Compress-Archive -Path quanta-compiler.exe -DestinationPath quanta-compiler-${{ matrix.target }}.zip
          $hash = (Get-FileHash quanta-compiler-${{ matrix.target }}.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  quanta-compiler-${{ matrix.target }}.zip" | Out-File -Encoding ASCII quanta-compiler-${{ matrix.target }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quanta-compiler-${{ matrix.target }}
          path: |
            target/release/quanta-compiler-${{ matrix.target }}.tar.gz
            target/release/quanta-compiler-${{ matrix.target }}.tar.gz.sha256
            target/x86_64-pc-windows-gnu/release/quanta-compiler-${{ matrix.target }}.zip
            target/x86_64-pc-windows-gnu/release/quanta-compiler-${{ matrix.target }}.zip.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten artifacts
        run: |
          # actions/upload-artifact@v4 keeps the path-relative-to-LCA
          # structure, so each archive arrives nested under
          # release/, x86_64-pc-windows-gnu/release/, etc. Flatten so
          # softprops/action-gh-release sees the files directly.
          mkdir -p dist
          find artifacts -type f \( -name 'quanta-compiler-*.tar.gz' \
                                  -o -name 'quanta-compiler-*.zip' \
                                  -o -name 'quanta-compiler-*.sha256' \) \
            -exec cp {} dist/ \;
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/quanta-compiler-*.tar.gz
            dist/quanta-compiler-*.zip
            dist/quanta-compiler-*.sha256
          generate_release_notes: true
