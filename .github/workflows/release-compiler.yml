name: Release Compiler Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: zip
          # macOS Intel (macos-13 deprecated; macos-13-large is paid)
          # is deferred. Native ARM Linux runner above covers Pi 5 +
          # Graviton + UTM-Ubuntu users.

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install LLVM 22 (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install llvm@22
          echo "LLVM_SYS_221_PREFIX=$(brew --prefix llvm@22)" >> $GITHUB_ENV

      - name: Install LLVM 22 (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          # Use the apt.llvm.org repo matching the runner's Ubuntu
          # codename (lsb_release -cs). Works for jammy (22.04) and
          # noble (24.04) on both x86_64 and arm64.
          CODENAME=$(lsb_release -cs)
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/${CODENAME}/ llvm-toolchain-${CODENAME}-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-22-dev libpolly-22-dev
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> $GITHUB_ENV

      # MSYS2 is the only practical source of `llvm-sys`-compatible
      # LLVM dev packages on Windows runners. The official LLVM Windows
      # release ships clang/lld/lldb but not the static libs + headers
      # `llvm-sys` needs. Chocolatey is in the same boat.
      #
      # UCRT64 (not CLANG64) is required: Rust's `x86_64-pc-windows-gnu`
      # toolchain links against `libgcc`/`libgcc_eh`, which CLANG64
      # doesn't ship (it uses compiler-rt). UCRT64 gives us GCC's
      # MinGW runtime AND LLVM 22 dev libs side by side.
      - name: Install MSYS2 + LLVM 22 (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-llvm
            mingw-w64-ucrt-x86_64-polly
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-lld
            mingw-w64-ucrt-x86_64-gcc

      - name: Wire LLVM_SYS_221_PREFIX (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: msys2 {0}
        run: |
          set -e
          # Resolve the actual install prefix from llvm-config rather
          # than guessing — msys2/setup-msys2 may install to a path
          # other than C:\msys64.
          LLVM_PREFIX_UNIX=$(llvm-config --prefix)
          echo "llvm-config --prefix → $LLVM_PREFIX_UNIX"
          echo "llvm-config --version → $(llvm-config --version)"
          ls -la "$LLVM_PREFIX_UNIX/bin/llvm-config"* || true
          ls "$LLVM_PREFIX_UNIX/lib/" | head -20 || true
          # Convert MSYS2 path (/clang64/...) to a Windows path so the
          # rust toolchain (running outside MSYS2) finds it.
          LLVM_PREFIX_WIN=$(cygpath -w "$LLVM_PREFIX_UNIX")
          BIN_WIN=$(cygpath -w "$LLVM_PREFIX_UNIX/bin")
          # The GNU triple expects gcc as the linker driver — it knows
          # how to find libgcc/libgcc_eh, where clang on its own does
          # not. Both ship in UCRT64.
          GCC_WIN=$(cygpath -w "$LLVM_PREFIX_UNIX/bin/gcc.exe")
          GXX_WIN=$(cygpath -w "$LLVM_PREFIX_UNIX/bin/g++.exe")
          echo "Windows prefix: $LLVM_PREFIX_WIN"
          echo "Windows gcc:    $GCC_WIN"
          echo "LLVM_SYS_221_PREFIX=$LLVM_PREFIX_WIN" >> $GITHUB_ENV
          echo "MSYS2_GCC=$GCC_WIN" >> $GITHUB_ENV
          echo "MSYS2_GXX=$GXX_WIN" >> $GITHUB_ENV
          echo "$BIN_WIN" >> $GITHUB_PATH

      - name: Verify LLVM is reachable from pwsh (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          echo "LLVM_SYS_221_PREFIX = $env:LLVM_SYS_221_PREFIX"
          if (Test-Path "$env:LLVM_SYS_221_PREFIX\bin\llvm-config.exe") {
            & "$env:LLVM_SYS_221_PREFIX\bin\llvm-config.exe" --version
            & "$env:LLVM_SYS_221_PREFIX\bin\llvm-config.exe" --libdir
          } else {
            Write-Error "llvm-config.exe NOT found at $env:LLVM_SYS_221_PREFIX\bin\"
            Get-ChildItem "$env:LLVM_SYS_221_PREFIX" -ErrorAction SilentlyContinue
            exit 1
          }

      # MSYS2 CLANG64 is a MinGW-w64/GNU toolchain. Rust's default
      # Windows host (`x86_64-pc-windows-msvc`) uses the MSVC ABI and
      # is incompatible. Build with the GNU triple so the LLVM libs
      # MSYS2 ships actually link.
      - name: Switch Rust to GNU triple (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          rustup target add x86_64-pc-windows-gnu --toolchain stable
          # Pin cargo to the MSYS2 UCRT64 gcc resolved in the previous
          # step via llvm-config — works regardless of where
          # setup-msys2 installed.
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=$env:MSYS2_GCC" >> $env:GITHUB_ENV
          echo "CC_x86_64-pc-windows-gnu=$env:MSYS2_GCC" >> $env:GITHUB_ENV
          echo "CXX_x86_64-pc-windows-gnu=$env:MSYS2_GXX" >> $env:GITHUB_ENV
          # Sanity-check the gcc the next step will use.
          if (Test-Path $env:MSYS2_GCC) {
            & $env:MSYS2_GCC --version
          } else {
            Write-Error "MSYS2 gcc not found at $env:MSYS2_GCC"
            exit 1
          }

      # A release binary that dynamically links libLLVM is killed by the
      # loader on any machine that lacks that exact libLLVM (dyld
      # "Library not loaded" / ld.so exit 127 / STATUS_DLL_NOT_FOUND).
      # We ship the library inside the archive next to the binary, so the
      # binary must look for it beside itself: bake a relative run path
      # ($ORIGIN/lib) into the ELF. Single-quote so $ORIGIN reaches the
      # linker literally instead of being expanded by this shell.
      - name: Build quanta-compiler (Linux — bundled-libLLVM rpath)
        if: startsWith(matrix.os, 'ubuntu')
        run: cargo build -p quanta-compiler --release
        env:
          RUSTFLAGS: '-C link-arg=-Wl,-rpath,$ORIGIN/lib'

      - name: Build quanta-compiler (macOS)
        if: startsWith(matrix.os, 'macos')
        run: cargo build -p quanta-compiler --release

      # Windows: build through the GNU triple because MSYS2's LLVM is
      # MinGW/GNU. The output .exe is standalone and runs on any
      # Windows; the asset is named using the MSVC matrix.target so
      # the downloader's `current_target()` lookup matches what most
      # Windows users default to.
      - name: Build quanta-compiler (Windows — GNU build)
        if: startsWith(matrix.os, 'windows')
        run: cargo build -p quanta-compiler --release --target x86_64-pc-windows-gnu

      # --- Bundle libLLVM into the archive -----------------------------
      #
      # The archive must be self-contained: the binary at the root, the
      # LLVM shared library it needs beside it (in lib/ on Unix, flat on
      # Windows). Extracting and running it must never touch a
      # system-installed LLVM. Asset NAMES are unchanged — only the
      # internal layout grows — so published download URLs stay stable.

      # Linux: rpath is already baked in ($ORIGIN/lib). A Raspberry Pi
      # validation run proved that bundling libLLVM alone is NOT enough:
      # llvm-sys links libLLVM against libz3, and a minimal Pi image
      # doesn't have it, so the loader kills the binary looking for
      # libz3.so.4 even though libLLVM itself resolved fine. libLLVM's
      # transitive closure (z3, zstd, tinfo/ncurses, xml2, ffi, and
      # whatever else the distro's LLVM package pulled in) is exactly as
      # load-bearing as libLLVM itself, so we bundle the ENTIRE
      # dependency closure of the binary — everything ldd reports —
      # except a small baseline we can assume every glibc target already
      # has: glibc itself (libc/libm/libpthread/libdl/librt/libresolv),
      # the dynamic loader/vDSO (ld-linux*, linux-vdso), and the
      # compiler runtime (libgcc_s, libstdc++). Disk is cheap; a
      # loader-kill on a user's machine is not.
      - name: Stage archive with bundled libLLVM (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          set -euo pipefail
          BIN=target/release/quanta-compiler
          # Fail loudly if the rpath didn't take — a silently missing
          # RUNPATH would ship a binary that only runs where LLVM is
          # already installed, exactly the trap we are closing.
          if command -v readelf >/dev/null; then
            readelf -d "$BIN" | grep -E 'RUNPATH|RPATH' || {
              echo "ERROR: no RUNPATH/RPATH in $BIN — \$ORIGIN/lib rpath was not applied"; exit 1; }
          fi
          mkdir -p stage/lib
          cp "$BIN" stage/quanta-compiler
          # Baseline: soname PREFIXES assumed present on every glibc
          # target, so we do NOT bundle them (bundling glibc itself would
          # be actively wrong — it must match the kernel/loader on the
          # target machine, not ours). Matched against the basename
          # prefix so both dev-symlink-style and versioned sonames hit
          # (e.g. "libc.so.6" starts with "libc.").
          BASELINE_PREFIXES=(
            'libc.' 'libc-'
            'libm.' 'libm-'
            'libpthread.' 'libpthread-'
            'libdl.' 'libdl-'
            'librt.' 'librt-'
            'libresolv.' 'libresolv-'
            'libgcc_s.'
            'libstdc++.'
            'ld-linux'
            'linux-vdso'
          )
          is_baseline() {
            local name="$1"
            for prefix in "${BASELINE_PREFIXES[@]}"; do
              case "$name" in
                "$prefix"*) return 0 ;;
              esac
            done
            return 1
          }
          # ldd on Linux already prints the FULL transitive closure (not
          # just direct deps), so walking its output surfaces libz3 and
          # friends without needing to recurse ourselves — simpler than
          # the macOS otool case, which only reports one level.
          ldd "$BIN" | grep -i 'llvm' || { echo "ERROR: binary does not link libLLVM"; exit 1; }
          ALL_LINES=$(ldd "$BIN")
          # Feed the loop from a here-string, not a pipe, so the copies
          # happen in THIS shell (a `... | while` runs in a subshell and
          # its failures/results wouldn't be visible to the assertion).
          while read -r soname _arrow resolved _rest; do
            [ -n "$soname" ] || continue
            # Entries with no resolved path (linux-vdso.so.1, or a bare
            # "not found") have nothing to copy — skip safely. vdso is
            # also caught by the baseline check above, so this mainly
            # guards against a genuinely missing library, which is a
            # build-environment problem, not something to paper over here.
            [ -n "$resolved" ] && [ -f "$resolved" ] || continue
            if is_baseline "$soname"; then
              echo "skipping $soname (baseline glibc/loader/compiler-runtime)"
              continue
            fi
            # Follow symlinks so we copy the real object, then place it
            # under the exact SONAME the binary records.
            cp -L "$resolved" "stage/lib/$soname"
            echo "bundled $soname  <=  $resolved"
          done <<< "$ALL_LINES"
          # Refuse to ship if libLLVM specifically didn't land in lib/ —
          # a broken glob or an unresolved ldd line would otherwise
          # produce a lib-less archive that only runs where LLVM is
          # already installed.
          ls stage/lib/*[Ll][Ll][Vv][Mm]* >/dev/null 2>&1 || {
            echo "ERROR: no libLLVM copied into stage/lib/"; exit 1; }
          echo "--- libLLVM's own dependencies (now bundled above unless baseline) ---"
          LIBLLVM=$(ls stage/lib/*[Ll][Ll][Vv][Mm]* | head -1)
          ldd "$LIBLLVM" || true
          echo "--- staged layout ---"
          find stage -maxdepth 2 -type f | sort
          # Smoke test only: the build runner still HAS system LLVM
          # installed (and every other package on the runner image), so
          # this does not prove the archive is self-contained — it only
          # catches a staging bug (wrong SONAME, truncated copy) before
          # the archive is even uploaded. The real gate is the `verify`
          # job below, which runs the extracted archive on a CLEAN
          # runner with no LLVM and no build toolchain at all.
          echo "--- smoke test: staged binary runs on the build runner ---"
          STAGE_OUT=$(./stage/quanta-compiler --rev)
          echo "stage/quanta-compiler --rev => $STAGE_OUT"
          if [ -z "$STAGE_OUT" ]; then
            echo "ERROR: staged binary produced empty --rev output"; exit 1
          fi

      # macOS: rpath alone does nothing here — the binary records the
      # ABSOLUTE path of every non-system dylib it links (otool -L), and
      # those live under Homebrew. libLLVM is the obvious one, but the
      # LLVM keg's transitive deps drag in others (e.g. a Homebrew
      # libunwind), and ANY absolute /opt/homebrew reference is a
      # loader-kill on a machine without that keg. So bundle them all:
      # for each dylib not under /usr/lib or /System, rewrite its load
      # command to @rpath/<basename>, copy the real file into stage/lib/,
      # and add a single @loader_path/lib run path. Then RE-SIGN:
      # install_name_tool invalidates the code signature, and arm64 macOS
      # refuses to run a binary with a broken signature ("Killed: 9").
      # Ad-hoc (-) signing is enough for an unnotarized CLI.
      - name: Stage archive with bundled libLLVM (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p stage/lib
          cp target/release/quanta-compiler stage/quanta-compiler
          BIN=stage/quanta-compiler
          # System dylibs (/usr/lib/*, /System/*) are always present on
          # macOS and resolved from the dyld shared cache — leave them.
          # Everything else (Homebrew et al.) is bundled beside the binary.
          REFS=$(otool -L "$BIN" | tail -n +2 | awk '{print $1}' \
                   | grep -Ev '^(/usr/lib/|/System/)' || true)
          if ! echo "$REFS" | grep -qi 'llvm'; then
            echo "ERROR: binary does not reference an LLVM dylib"; otool -L "$BIN"; exit 1
          fi
          # Read line by line — the paths never contain spaces, but a
          # bare `for X in $REFS` would depend on IFS splitting on
          # newlines, which is not guaranteed across shells/runners.
          while IFS= read -r REF; do
            [ -n "$REF" ] || continue
            BASENAME=$(basename "$REF")
            echo "bundling $REF  ->  @rpath/$BASENAME"
            # Point the load command at the copy beside the binary.
            install_name_tool -change "$REF" "@rpath/$BASENAME" "$BIN"
            # Copy the real object (resolve Homebrew's version symlink)
            # under the exact basename the load command now names.
            cp -L "$REF" "stage/lib/$BASENAME"
          done <<< "$REFS"
          # @loader_path is the directory of THIS binary at load time, so
          # @rpath/... resolves to stage/lib/ wherever the archive lands.
          install_name_tool -add_rpath "@loader_path/lib" "$BIN"
          # install_name_tool broke the signature — ad-hoc re-sign or the
          # loader kills the process before main on Apple Silicon.
          codesign --force --sign - "$BIN"
          echo "--- otool -L after rewrite (non-system refs must be @rpath/...) ---"
          otool -L "$BIN"
          echo "--- staged layout ---"
          find stage -maxdepth 2 -type f | sort

      # Windows: the GNU build dynamically links libLLVM plus the MinGW
      # runtime DLLs, none of which exist on a stock Windows box. Windows
      # resolves DLLs from the directory of the .exe first, so we copy
      # every non-system DLL the exe depends on next to it (flat, no lib/
      # subdir). ldd inside MSYS2 reports the full closure; anything under
      # C:/Windows is an OS DLL and stays out of the archive.
      - name: Stage archive with bundled DLLs (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: msys2 {0}
        run: |
          set -euo pipefail
          EXE=target/x86_64-pc-windows-gnu/release/quanta-compiler.exe
          mkdir -p stage
          cp "$EXE" stage/quanta-compiler.exe
          # ldd prints "name.dll => /path (0x...)"; keep entries whose
          # resolved path is NOT under a Windows system directory. This
          # captures libLLVM, libgcc_s_seh, libstdc++, libwinpthread, and
          # whatever zlib/zstd/ffi/xml2 the LLVM build pulled in. Filter
          # both /c/windows and /c/Windows since ldd's casing varies.
          DLL_LINES=$(ldd "$EXE" | grep '=>' | grep -ivE '=> /c/windows/')
          while read -r name _arrow resolved _rest; do
            [ -n "$name" ] || continue
            if [ -f "$resolved" ]; then
              cp "$resolved" "stage/$name"
              echo "bundled $name  <=  $resolved"
            fi
          done <<< "$DLL_LINES"
          # Refuse to ship a DLL-less exe: without libLLVM beside it the
          # binary is STATUS_DLL_NOT_FOUND on any machine but this runner.
          ls stage/ | grep -qi 'llvm.*\.dll' || {
            echo "ERROR: no libLLVM DLL copied next to the exe"; ls -la stage/; exit 1; }
          echo "--- staged layout (exe + adjacent DLLs) ---"
          ls -la stage/

      # Package from INSIDE stage/ so the archive root is the binary with
      # lib/ (or the adjacent DLLs) beside it — exactly the layout the
      # loader/rpath contract needs after extraction.
      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd stage
          tar czf ../quanta-compiler-${{ matrix.target }}.tar.gz quanta-compiler lib
          cd ..
          # macOS doesn't ship `sha256sum`; `shasum -a 256` exists on
          # both macOS and Linux.
          if command -v sha256sum >/dev/null; then
            sha256sum quanta-compiler-${{ matrix.target }}.tar.gz \
              > quanta-compiler-${{ matrix.target }}.tar.gz.sha256
          else
            shasum -a 256 quanta-compiler-${{ matrix.target }}.tar.gz \
              > quanta-compiler-${{ matrix.target }}.tar.gz.sha256
          fi

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          # Zip the whole staging dir contents flat: the .exe and every
          # bundled DLL sit side by side, which is where Windows looks
          # for them first.
          Compress-Archive -Path stage\* -DestinationPath quanta-compiler-${{ matrix.target }}.zip
          $hash = (Get-FileHash quanta-compiler-${{ matrix.target }}.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  quanta-compiler-${{ matrix.target }}.zip" | Out-File -Encoding ASCII quanta-compiler-${{ matrix.target }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quanta-compiler-${{ matrix.target }}
          path: |
            quanta-compiler-${{ matrix.target }}.tar.gz
            quanta-compiler-${{ matrix.target }}.tar.gz.sha256
            quanta-compiler-${{ matrix.target }}.zip
            quanta-compiler-${{ matrix.target }}.zip.sha256
          if-no-files-found: ignore

  # Prove every published archive is self-contained BEFORE it can be
  # released: download each build's artifact onto a CLEAN runner of the
  # same OS — no LLVM, no Rust toolchain — extract it the way a user
  # would, and run the binary. If libLLVM bundling regressed, the loader
  # kills `--rev` here and the release is blocked. Runs on
  # workflow_dispatch too (it only needs the uploaded artifacts, not a tag).
  verify:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Download artifact under test
        uses: actions/download-artifact@v4
        with:
          name: quanta-compiler-${{ matrix.target }}
          path: dl

      # Extract exactly like a user: whole archive, preserving lib/.
      - name: Extract and run --rev (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          cd dl
          mkdir -p extracted
          tar xzf quanta-compiler-${{ matrix.target }}.tar.gz -C extracted
          echo "--- extracted layout ---"
          find extracted -maxdepth 2 | sort
          # sha256: the runner may ship sha256sum (Linux) or only shasum (macOS).
          if command -v sha256sum >/dev/null; then
            sha256sum -c quanta-compiler-${{ matrix.target }}.tar.gz.sha256
          else
            shasum -a 256 -c quanta-compiler-${{ matrix.target }}.tar.gz.sha256
          fi
          # The acceptance test: the binary must LOAD (its bundled libLLVM
          # resolves via the baked rpath) and print a non-empty build rev.
          OUT=$(./extracted/quanta-compiler --rev)
          echo "quanta-compiler --rev => $OUT"
          if [ -z "$OUT" ]; then echo "ERROR: --rev produced empty output"; exit 1; fi

      - name: Extract and run --rev (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cd dl
          Expand-Archive -Path "quanta-compiler-${{ matrix.target }}.zip" -DestinationPath extracted -Force
          Write-Host "--- extracted layout ---"
          Get-ChildItem extracted
          # sha256 check against the published sidecar.
          $expected = (Get-Content "quanta-compiler-${{ matrix.target }}.zip.sha256").Split(' ')[0].Trim()
          $actual = (Get-FileHash "quanta-compiler-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          if ($expected -ne $actual) {
            Write-Error "sha256 mismatch: expected $expected, got $actual"; exit 1
          }
          # The exe must load its adjacent DLLs and print a build rev.
          $out = & ".\extracted\quanta-compiler.exe" --rev
          Write-Host "quanta-compiler --rev => $out"
          if ([string]::IsNullOrWhiteSpace($out)) { Write-Error "--rev produced empty output"; exit 1 }

  release:
    needs: [build, verify]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten artifacts
        run: |
          # actions/upload-artifact@v4 keeps the path-relative-to-LCA
          # structure, so archives may arrive nested. Flatten so
          # softprops/action-gh-release sees the files directly.
          mkdir -p dist
          find artifacts -type f \( -name 'quanta-compiler-*.tar.gz' \
                                  -o -name 'quanta-compiler-*.zip' \
                                  -o -name 'quanta-compiler-*.sha256' \) \
            -exec cp {} dist/ \;
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/quanta-compiler-*.tar.gz
            dist/quanta-compiler-*.zip
            dist/quanta-compiler-*.sha256
          generate_release_notes: true
