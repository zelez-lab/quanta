[book]
title = "Quanta"
description = "GPU compute and rendering for Rust"
authors = ["Quanta Contributors"]
language = "en"
src = "."

[build]
build-dir = "../target/book"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/zelez-lab/quanta"
edit-url-template = "https://github.com/zelez-lab/quanta/edit/main/docs/{path}"
