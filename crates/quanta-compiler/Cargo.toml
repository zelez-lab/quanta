[package]
name = "quanta-compiler"
version = "0.1.0"
edition = "2024"
description = "Quanta kernel compiler — KernelIR to GPU ISA (AMD, NVIDIA, SPIR-V, MSL)"

[dependencies]
quanta-ir = { path = "../quanta-ir" }
bincode = "1"
serde = { version = "1", features = ["derive"] }
inkwell = { version = "0.9", features = ["llvm22-1-force-dynamic"] }
